name: Apply news notification toggle

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 1
          show-progress: false

      - name: Apply source changes
        run: |
          python3 .github/scripts/apply_news_toggle.py
          rm .github/scripts/apply_news_toggle.py
          rm .github/workflows/apply-news-notification-toggle.yml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build and test
        id: gradle
        shell: bash
        run: |
          set +e
          chmod +x gradlew
          ./gradlew assembleDebug testDebugUnitTest -x lint > /tmp/gradle.log 2>&1
          status=$?
          tail -n 80 /tmp/gradle.log
          exit "$status"

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notification-toggle-gradle-log
          path: /tmp/gradle.log
          if-no-files-found: error
          retention-days: 1

      - name: Commit changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add news notification toggle"
          git push origin HEAD:dev
